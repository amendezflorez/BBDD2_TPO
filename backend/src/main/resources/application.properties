spring.application.name=findra-backend
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/findra}
server.port=${PORT:8080}

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

findra.seed.enabled=${FINDRA_SEED_ENABLED:true}
findra.cors.allowed-origins=${FINDRA_CORS_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://[::1]:5173}

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.cache.type=redis

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
