services:
  mongo:
    image: mongo:8.0
    container_name: findra-mongo
    ports:
      - "27017:27017"
    volumes:
      - findra_mongo_data:/data/db

  mongo-express:
    image: mongo-express:1.0.2
    container_name: findra-mongo-express
    depends_on:
      - mongo
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_BASICAUTH: "false"

volumes:
  findra_mongo_data:
